<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#C5935A;stop-opacity:0.4" />
      <stop offset="60%" style="stop-color:#C5935A;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#C5935A;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Deep background -->
  <rect width="100" height="100" rx="20" fill="#050A05" />
  
  <!-- Subtle glow aura -->
  <circle cx="50" cy="50" r="38" fill="url(#glow)" />
  
  <!-- Ring — the anchoring -->
  <circle cx="50" cy="50" r="28" fill="none" stroke="#C5935A" stroke-width="1.8" opacity="0.35" />
  
  <!-- Dot — the source -->
  <circle cx="50" cy="50" r="9" fill="#C5935A" />
</svg>
