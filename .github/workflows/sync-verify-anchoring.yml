name: Sync verify-anchoring to dedicated repo

on:
  push:
    branches: [main]
    paths:
      - 'verify-anchoring/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Clone target repo with PAT
        run: |
          git clone https://x-access-token:${{ secrets.VERIFY_ANCHORING_PAT }}@github.com/AnchoringTrust/verify-anchoring.git target-repo
          cd target-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B main origin/main

      - name: Sync files
        run: |
          # Sync all files from verify-anchoring/ to target repo root
          rsync -av --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='CNAME' \
            verify-anchoring/ target-repo/

      - name: Commit and push
        working-directory: target-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.VERIFY_ANCHORING_PAT }}@github.com/AnchoringTrust/verify-anchoring.git
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync"
          else
            git commit -m "Sync from Lovable project — $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin main
          fi
