name: Sync anchor-action to dedicated repo

on:
  push:
    branches: [main]
    paths:
      - 'cli/github-action/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Clone target repo (robust for empty/new repos)
        run: |
          git clone https://x-access-token:${{ secrets.ANCHOR_ACTION_PAT }}@github.com/AnchoringTrust/anchor-action.git target-repo
          cd target-repo

          if git ls-remote --exit-code --heads origin main >/dev/null 2>&1; then
            git checkout -B main origin/main
          elif git ls-remote --exit-code --heads origin master >/dev/null 2>&1; then
            git checkout -B main origin/master
          else
            git checkout --orphan main
            git commit --allow-empty -m "Initialize main branch"
            git push origin main
          fi

      - name: Sync files
        run: |
          rsync -av --delete \
            --exclude='.git' \
            --exclude='.github' \
            cli/github-action/ target-repo/

      - name: Commit and push
        working-directory: target-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync"
          else
            git commit -m "Sync from Lovable project — $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
