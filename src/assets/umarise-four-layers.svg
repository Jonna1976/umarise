<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 560" font-family="Georgia, serif">

  <!-- Background -->
  <rect width="640" height="560" fill="#fafaf8"/>

  <!-- Title -->
  <text x="320" y="38" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a" letter-spacing="1">UMARISE · FOUR LAYERS</text>
  <text x="320" y="56" text-anchor="middle" font-size="11" fill="#888888">One primitive. Three layers of assurance around it.</text>

  <!-- LAYER 4: Expertise (dashed = latent) -->
  <rect x="30" y="72" width="580" height="438" rx="6" fill="#f7f4ef" stroke="#c8b99a" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="52" y="96" font-size="10" font-weight="bold" fill="#8a6f4e" letter-spacing="1.5">LAYER 4  ·  EXPERTISE</text>
  <text x="52" y="112" font-size="10" fill="#8a6f4e">Architecture reviews · Onboarding · Compliance whitepapers · Integration guidance</text>
  <text x="590" y="96" font-size="10" fill="#b8a888" text-anchor="end" font-style="italic">Latent · Triggered by partner request</text>

  <!-- LAYER 3: Assurance -->
  <rect x="60" y="124" width="520" height="346" rx="6" fill="#e8f0e8" stroke="#8aaf8a" stroke-width="1.5"/>
  <text x="82" y="148" font-size="10" font-weight="bold" fill="#3d6e3d" letter-spacing="1.5">LAYER 3  ·  ASSURANCE</text>
  <text x="82" y="164" font-size="10" fill="#3d6e3d">SLA · SOC2 · DPA · Status page · Uptime commitment · Incident response</text>
  <text x="558" y="148" font-size="10" fill="#3d6e3d" text-anchor="end">For the risk register</text>

  <!-- LAYER 2: Developer Infrastructure + tier badges -->
  <rect x="90" y="176" width="460" height="254" rx="6" fill="#e4edf5" stroke="#6a9ab8" stroke-width="1.5"/>
  <text x="112" y="200" font-size="10" font-weight="bold" fill="#2a5f80" letter-spacing="1.5">LAYER 2  ·  DEVELOPER INFRASTRUCTURE</text>
  <text x="112" y="216" font-size="10" fill="#2a5f80">SDKs · Docs · Sandbox · Reference verifier · Templates · Rate limiting · AI integration path</text>
  <text x="530" y="200" font-size="10" fill="#2a5f80" text-anchor="end">Deploy once · Self-serve</text>

  <!-- Tier badges in Layer 2 -->
  <text x="320" y="240" text-anchor="middle" font-size="9" fill="#6a9ab8" letter-spacing="1">PROCESSING TIER</text>

  <rect x="152" y="248" width="90" height="22" rx="3" fill="#dce8f2" stroke="#9ab8d0" stroke-width="1"/>
  <text x="197" y="263" text-anchor="middle" font-size="9" fill="#4a7a9a">Sandbox  /  free</text>

  <rect x="275" y="248" width="90" height="22" rx="3" fill="#dce8f2" stroke="#9ab8d0" stroke-width="1"/>
  <text x="320" y="263" text-anchor="middle" font-size="9" fill="#2a5f80">Standard  /  0.10</text>

  <rect x="398" y="248" width="90" height="22" rx="3" fill="#dce8f2" stroke="#d4a843" stroke-width="1"/>
  <text x="443" y="263" text-anchor="middle" font-size="9" fill="#b08820">Certified  /  0.25</text>

  <text x="320" y="290" text-anchor="middle" font-size="9" fill="#7a9ab5" font-style="italic">Same primitive. Same endpoint. Different SLA and batch priority.</text>

  <!-- LAYER 1: The Primitive -->
  <rect x="120" y="302" width="400" height="118" rx="6" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Circumpunct -->
  <circle cx="320" cy="338" r="18" fill="none" stroke="#d4a843" stroke-width="2"/>
  <circle cx="320" cy="338" r="3.5" fill="#d4a843"/>

  <text x="320" y="374" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff" letter-spacing="2">LAYER 1  ·  THE PRIMITIVE</text>
  <text x="320" y="390" text-anchor="middle" font-size="10" fill="#aaaaaa">Hash in · Proof out · Bitcoin anchor · Independently verifiable</text>
  <text x="320" y="406" text-anchor="middle" font-size="9" fill="#666666">anchoring-spec.org · verify-anchoring.org · Frozen. No new endpoints.</text>

  <!-- Bottom rule -->
  <line x1="30" y1="526" x2="610" y2="526" stroke="#e0ddd8" stroke-width="1"/>
  <text x="320" y="544" text-anchor="middle" font-size="10" fill="#aaaaaa">Layers 1 and 2 are the seeding engine. Layers 3 and 4 are the revenue.</text>

</svg>
